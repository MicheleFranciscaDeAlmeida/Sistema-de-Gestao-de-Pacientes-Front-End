<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Pacientes</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <h1>Sistema de Gestão de Pacientes</h1>

    <form id="formPaciente" class="container">

        <section class="card">
            <h2>Informações do Paciente</h2>

            <div class="grid">
                <input type="text" id="nome" placeholder="Nome completo" required>
                <input type="number" id="idade" placeholder="Idade" required>
                <input type="text" id="cpf" placeholder="CPF">
            </div>
        </section>

        <section class="card">
            <button type="submit" class="btn">Salvar Cadastro</button>
        </section>

    </form>

    <section class="container">

        <h2>Pacientes Cadastrados</h2>

        <input type="text" id="busca" placeholder="🔍 Buscar paciente..." class="busca">

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Idade</th>
                    <th>CPF</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaPacientes"></tbody>
        </table>

    </section>

    <script src="js/script.js"></script>
</body>

</html>
